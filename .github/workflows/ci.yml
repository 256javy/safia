name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm generate-manifest

      - run: pnpm build
        env:
          # Build-time only — not real credentials, used for type checking and static analysis
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-build-secret-not-real-32chars!!' }}
          NEXTAUTH_URL: https://safia.app
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
